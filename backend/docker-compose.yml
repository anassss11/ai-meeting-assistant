version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bart-backend-cpu
    ports:
      - "8000:8000"
    environment:
      BART_DEVICE: cpu
      BART_ENABLE_FALLBACK: "true"
      BART_WARMUP: "true"
      BART_MAX_LENGTH: "150"
      BART_MIN_LENGTH: "40"
      BART_MODEL_CACHE_DIR: /home/appuser/.cache/huggingface
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./transcripts:/app/transcripts
      - model-cache:/home/appuser/.cache/huggingface
    mem_limit: 4g
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health/bart')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  model-cache:
    driver: local
